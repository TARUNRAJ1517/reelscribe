<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Transcript</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-top:40px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

input[type="file"]{
width:100%;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6d5dfc,#00d4c6);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#status{
margin-top:15px;
padding:15px;
background:#fafafa;
border-radius:12px;
white-space:pre-wrap;
line-height:1.6;
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🎥 New Transcript</h1>

<p>
Upload a video and generate a full transcript
</p>

<input
type="file"
id="videoFile"
accept="video/*"
>

<button onclick="transcribeVideo()">
Generate Transcript
</button>

<div id="status"></div>

</div>

<script>

const email =
localStorage.getItem("userEmail");

if(!email){

window.location.href =
"/";

}

async function transcribeVideo(){

const file =
document.getElementById(
"videoFile"
).files[0];

if(!file){

alert("Select a video");
return;

}

const status =
document.getElementById(
"status"
);

status.style.display =
"block";

status.innerText =
"⏳ Generating Transcript...";

const formData =
new FormData();

formData.append(
"email",
email
);

formData.append(
"video",
file
);

try{

const response =
await fetch(
"/transcribe",
{
method:"POST",
body:formData
}
);

const data =
await response.json();

if(data.success){

localStorage.setItem(
"latestTranscript",
data.transcript
);

window.location.href =
"/dashboard.html";

}else{

status.innerText =
data.error ||
"Something went wrong";

}

}catch(err){

status.innerText =
"Server Error";

console.log(err);

}

}

</script>

</body>
</html>
