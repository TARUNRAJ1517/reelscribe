<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ReelScribe Dashboard</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0718;
padding:20px;
color:white;
}

.topbar{
max-width:700px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
position:relative;
margin-bottom:15px;
}

.menuBtn{
position:absolute;
left:0;
width:45px;
height:45px;
border-radius:50%;
background:#121026;
border:1px solid #2b224a;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:22px;
color:white;
}

.logo{
font-size:32px;
font-weight:bold;
background:linear-gradient(90deg,#8b5cf6,#ec4899);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
background:#121026;
padding:20px;
border-radius:24px;
border:1px solid #2b224a;
}

.card{
background:#1a1730;
border:1px solid #2b224a;
border-radius:18px;
padding:18px;
margin-bottom:15px;
}

.card h3{
margin-bottom:12px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#8b5cf6,#ec4899);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.transcript{
white-space:pre-wrap;
line-height:1.8;
max-height:450px;
overflow:auto;
}

.drawer{
position:fixed;
top:0;
left:-300px;
width:280px;
height:100%;
background:#121026;
border-right:1px solid #2b224a;
padding:20px;
transition:.3s;
z-index:999;
}

.drawer.active{
left:0;
}

.drawer h3{
margin-bottom:8px;
}

.drawer p{
color:#b8b8c5;
margin-bottom:15px;
}

</style></head><body><div id="drawer" class="drawer"><h3 id="drawerName">
User
</h3><p id="drawerEmail">
Loading...
</p><p>
💰 Credits:
<span id="credits">
Loading...
</span>
</p><button onclick="historyPage()">
📜 History
</button><button onclick="buyCredits()">
💳 Buy Credits
</button><button onclick="logout()">
🚪 Logout
</button></div><div class="topbar"><div
class="menuBtn"
onclick="toggleDrawer()">
👤
</div><div class="logo">
🚀 ReelScribe
</div></div><div class="container"><div class="card"><h3>
📄 Full Transcript
</h3><div
class="transcript"
id="fullTranscript">
No Transcript
</div></div><div class="card"><h3>
🎥 New Transcript
</h3><p>
Upload a new video and generate transcript
</p><button onclick="newTranscript()">
Create New Transcript
</button></div></div><script>

  const params =
new URLSearchParams(window.location.search);

const googleEmail =
params.get("email");

if(googleEmail){

localStorage.setItem(
"userEmail",
googleEmail
);

}

const email =
localStorage.getItem(
"userEmail"
);

if(!email){

window.location.href="/";

}

document.getElementById(
"drawerEmail"
).innerText =
email;

document.getElementById(
"drawerName"
).innerText =
email.split("@")[0];

const transcript =
localStorage.getItem(
"latestTranscript"
);

if(transcript){

document.getElementById(
"fullTranscript"
).innerText =
transcript;

}

async function loadCredits(){

try{

const response =
await fetch(
"/credits/" +
encodeURIComponent(email)
);

const data =
await response.json();

if(data.success){

document.getElementById(
"credits"
).innerText =
data.credits;

}

}catch(error){

console.log(error);

}

}

loadCredits();

function toggleDrawer(){

document.getElementById(
"drawer"
).classList.toggle(
"active"
);

}

function newTranscript(){

localStorage.removeItem(
"latestTranscript"
);

window.location.href=
"/new.html";

}

function buyCredits(){

window.open(
"https://instagram.com/tarunraj1517",
"_blank"
);

}

function historyPage(){

alert(
"History page coming soon"
);

}

function logout(){

localStorage.removeItem(
"userEmail"
);

localStorage.removeItem(
"latestTranscript"
);

window.location.href="/";

}

document.addEventListener(
"click",
function(e){

const drawer =
document.getElementById(
"drawer"
);

const menuBtn =
document.querySelector(
".menuBtn"
);

if(
drawer.classList.contains(
"active"
) &&
!drawer.contains(
e.target
) &&
!menuBtn.contains(
e.target
)
){

drawer.classList.remove(
"active"
);

}

}
);

</script></body>
</html>
