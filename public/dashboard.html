<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ReelScribe Dashboard</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0718;
    padding:15px;
    color:white;
    min-height:100vh;
    max-width:480px;
    margin:0 auto;
}

/* ── Overlay ── */
.overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(3px);
    z-index:998;
}
.overlay.active{ display:block; }

/* ── Drawer ── */
.drawer{
    position:fixed;
    top:0;
    left:-320px;
    width:75%;
    max-width:280px;
    height:100%;
    background:#121026;
    border-right:1px solid #2b224a;
    padding:30px 20px 20px;
    transition:.3s ease;
    z-index:999;
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow-y:auto;
}
.drawer.active{ left:0; }

.drawerAvatar{
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(135deg,#8b5cf6,#ec4899);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    margin-bottom:8px;
}

.drawerName{
    font-size:17px;
    font-weight:bold;
    color:white;
}

.drawerEmail{
    font-size:12px;
    color:#8d8aa5;
    margin-bottom:5px;
    word-break:break-all;
}

.creditsBox{
    background:#1a1730;
    border:1px solid #2b224a;
    border-radius:12px;
    padding:12px 15px;
    font-size:14px;
    color:#b8b8c5;
    margin-bottom:5px;
}

.drawer button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#8b5cf6,#ec4899);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:0;
}

/* ── Topbar ── */
.topbar{
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    margin-bottom:15px;
}

.menuBtn{
    position:absolute;
    left:0;
    width:42px;
    height:42px;
    border-radius:50%;
    background:#121026;
    border:1px solid #2b224a;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:20px;
    color:white;
}

.logo{
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(90deg,#8b5cf6,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    cursor:pointer;
}

/* ── Container ── */
.container{
    background:#121026;
    padding:15px;
    border-radius:20px;
    border:1px solid #2b224a;
}

.card{
    background:#1a1730;
    border:1px solid #2b224a;
    border-radius:16px;
    padding:15px;
    margin-bottom:12px;
}

.card h3{
    margin-bottom:10px;
    font-size:16px;
}

.card p{
    color:#8d8aa5;
    font-size:13px;
    margin-bottom:5px;
}

.transcript{
    white-space:pre-wrap;
    line-height:1.7;
    max-height:400px;
    overflow:auto;
    font-size:14px;
    color:#ddd;
}

.noTranscript{
    color:#8d8aa5;
    font-size:14px;
    text-align:center;
    padding:20px 0;
}

.copyBtn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#8b5cf6,#ec4899);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:12px;
    display:none;
}

.mainBtn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#8b5cf6,#ec4899);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* ── History ── */
.historyItem{
    background:#0d0a1d;
    border:1px solid #2b224a;
    border-radius:12px;
    padding:12px;
    margin-bottom:10px;
    cursor:pointer;
    transition:.2s;
}

.historyItem:hover{
    border-color:#8b5cf6;
}

.historyDate{
    font-size:11px;
    color:#8d8aa5;
    margin-bottom:5px;
}

.historyPreview{
    font-size:13px;
    color:#ccc;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.historyUrl{
    font-size:11px;
    color:#8b5cf6;
    margin-top:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.noHistory{
    text-align:center;
    color:#8d8aa5;
    font-size:13px;
    padding:15px 0;
}

/* ── Loading ── */
.loading{
    text-align:center;
    color:#8d8aa5;
    font-size:13px;
    padding:15px 0;
}

</style>
</head>
<body>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>

<!-- Drawer -->
<div id="drawer" class="drawer">
    <div class="drawerAvatar">👤</div>
    <div class="drawerName" id="drawerName">User</div>
    <div class="drawerEmail" id="drawerEmail">Loading...</div>
    <div class="creditsBox">💰 Credits: <span id="credits">Loading...</span></div>
    <button onclick="toggleDrawer()">✖ Close</button>
    <button onclick="buyCredits()">💳 Buy Credits</button>
    <button onclick="logout()">🚪 Logout</button>
</div>

<!-- Topbar -->
<div class="topbar">
    <div class="menuBtn" onclick="toggleDrawer()">👤</div>
    <div class="logo" onclick="window.location.href='/'">🚀 ReelScribe</div>
</div>

<!-- Main -->
<div class="container">

    <!-- Latest Transcript -->
    <div class="card">
        <h3>📄 Latest Transcript</h3>
        <div class="transcript" id="fullTranscript">
            <div class="loading">⏳ Loading...</div>
        </div>
        <button class="copyBtn" id="copyBtn" onclick="copyTranscript()">📋 Copy Transcript</button>
    </div>

    <!-- New Transcript -->
    <div class="card">
        <h3>🎥 New Transcript</h3>
        <p>Upload a new video or paste Instagram URL</p>
        <button class="mainBtn" onclick="newTranscript()">✨ Create New Transcript</button>
    </div>

    <!-- History -->
    <div class="card">
        <h3>📜 History</h3>
        <div id="historyList">
            <div class="loading">⏳ Loading...</div>
        </div>
    </div>

</div>

<script>

// Email setup
const params = new URLSearchParams(window.location.search);
const googleEmail = params.get("email");
if(googleEmail){
    localStorage.setItem("userEmail", googleEmail);
}

const email = localStorage.getItem("userEmail");
if(!email){
    window.location.href = "/";
}

document.getElementById("drawerEmail").innerText = email;
document.getElementById("drawerName").innerText = email.split("@")[0];

// ── Load Credits ──
async function loadCredits(){
    try{
        const res = await fetch("/credits/" + encodeURIComponent(email));
        const data = await res.json();
        if(data.success){
            document.getElementById("credits").innerText = data.credits;
        }
    } catch(e){
        console.log(e);
    }
}

// ── Load Latest Transcript from Server ──
async function loadLatestTranscript(){
    try{
        const res = await fetch("/history/" + encodeURIComponent(email));
        const data = await res.json();

        const transcriptDiv = document.getElementById("fullTranscript");
        const copyBtn = document.getElementById("copyBtn");

        if(data.success && data.data && data.data.length > 0){
            const latest = data.data[0]; // sabse latest
            transcriptDiv.innerText = latest.transcript;
            // localStorage bhi update karo
            localStorage.setItem("latestTranscript", latest.transcript);
            // Copy button dikhao
            copyBtn.style.display = "block";
        } else {
            transcriptDiv.innerHTML = '<div class="noTranscript">📭 Koi transcript nahi hai abhi.<br>Naya banao!</div>';
            copyBtn.style.display = "none";
        }
    } catch(e){
        document.getElementById("fullTranscript").innerHTML = '<div class="noTranscript">❌ Load nahi hua</div>';
        console.log(e);
    }
}

// ── Load History ──
async function loadHistory(){
    try{
        const res = await fetch("/history/" + encodeURIComponent(email));
        const data = await res.json();

        const historyList = document.getElementById("historyList");

        if(data.success && data.data && data.data.length > 0){
            historyList.innerHTML = "";
            data.data.forEach((item, index) => {
                const date = new Date(item.createdAt).toLocaleDateString("en-IN", {
                    day:"numeric", month:"short", year:"numeric",
                    hour:"2-digit", minute:"2-digit"
                });

                const div = document.createElement("div");
                div.className = "historyItem";
                div.innerHTML = `
                    <div class="historyDate">📅 ${date}</div>
                    <div class="historyPreview">${item.transcript.substring(0, 80)}...</div>
                    <div class="historyUrl">${item.reelUrl.substring(0, 50)}</div>
                `;
                div.onclick = () => {
                    // Click pe transcript load karo
                    document.getElementById("fullTranscript").innerText = item.transcript;
                    document.getElementById("copyBtn").style.display = "block";
                    localStorage.setItem("latestTranscript", item.transcript);
                    window.scrollTo({ top: 0, behavior: "smooth" });
                };
                historyList.appendChild(div);
            });
        } else {
            historyList.innerHTML = '<div class="noHistory">📭 Koi history nahi hai</div>';
        }
    } catch(e){
        document.getElementById("historyList").innerHTML = '<div class="noHistory">❌ History load nahi hui</div>';
        console.log(e);
    }
}

// ── Copy Transcript ──
function copyTranscript(){
    const text = document.getElementById("fullTranscript").innerText;
    navigator.clipboard.writeText(text).then(()=>{
        alert("✅ Transcript copied!");
    }).catch(()=>{
        alert("Copy failed, manually select karo.");
    });
}

// ── Drawer ──
function toggleDrawer(){
    document.getElementById("drawer").classList.toggle("active");
    document.getElementById("overlay").classList.toggle("active");
}

// ── Actions ──
function newTranscript(){
    localStorage.removeItem("latestTranscript");
    window.location.href = "/new.html";
}

function buyCredits(){
    window.location.href = "/pricing.html";
}

function logout(){
    localStorage.removeItem("userEmail");
    localStorage.removeItem("latestTranscript");
    window.location.href = "/";
}

// ── Init ──
loadCredits();
loadLatestTranscript();
loadHistory();

</script>
</body>
</html>
