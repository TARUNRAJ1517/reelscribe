<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ReelScribe</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-top:40px;
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

input[type="file"]{
width:100%;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#6d5dfc,#00d4c6);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#previewBox{
display:none;
margin-top:20px;
padding:15px;
background:#fafafa;
border-radius:12px;
}

#previewText{
white-space:pre-wrap;
line-height:1.6;
}

hr{
margin:15px 0;
}

</style></head><body><div class="container"><h1>🚀 ReelScribe</h1><p>
Upload any video and get an accurate transcript instantly.
</p><input
type="file"
id="videoFile"
accept="video/*"
/>

<button onclick="transcribeVideo()">
Get Transcript
</button><div id="previewBox"><h3>Transcript Preview</h3><div id="previewText"></div><hr><button onclick="showLogin()">
🔓 Unlock Full Transcript
</button><div id="loginBox"
style="display:none;margin-top:15px;">

  <input
type="email"
id="email"
placeholder="Enter Email"
style="
width:100%;
padding:12px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
">

<button onclick="sendOtp()">
Send OTP
</button><input
type="text"
id="otp"
placeholder="Enter OTP"
style="
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
">

<button onclick="verifyOtp()">
Verify OTP
</button></div></div></div><script>

let fullTranscript = "";

  async function transcribeVideo(){

const fileInput =
document.getElementById("videoFile");

if(!fileInput.files[0]){
alert("Select a video");
return;
}

document.getElementById(
"previewBox"
).style.display = "block";

document.getElementById(
"previewText"
).innerText =
"⏳ Generating transcript...";

const formData = new FormData();

formData.append(
"email",
"test@gmail.com"
);

formData.append(
"video",
fileInput.files[0]
);

try{

const response = await fetch(
"/transcribe",
{
method:"POST",
body:formData
}
);

const data = await response.json();

if(data.success){

fullTranscript =
data.transcript;

document.getElementById(
"previewText"
).innerText =
data.transcript.substring(0,300)

+ "...";

}else{

document.getElementById(
"previewText"
).innerText =
data.error ||
"Something went wrong";

}

}catch(error){

document.getElementById(
"previewText"
).innerText =
"Server Error";

}

  }

  function showLogin(){

document.getElementById(
"loginBox"
).style.display = "block";

}

async function sendOtp(){

try{

const email =
document.getElementById("email").value;

if(!email){
alert("Enter Email");
return;
}

const response = await fetch(
"/send-otp",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ email })
}
);

const text = await response.text();

console.log("OTP RESPONSE:", text);

let data;

try{
data = JSON.parse(text);
}catch{
alert("Server returned invalid response");
return;
}

alert(data.message || data.error || "OTP Sent");

}catch(error){

console.error(error);
alert("OTP Error: " + error.message);

}

}
async function verifyOtp(){

const email =
document.getElementById("email").value;

const otp =
document.getElementById("otp").value;

const response = await fetch(
"/verify-otp",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
otp
})
}
);

const data = await response.json();

if(data.success){

localStorage.setItem(
"userEmail",
email
);

document.getElementById(
"previewText"
).innerText =
fullTranscript;

alert(
"Login Successful"
);

}else{

alert(
data.message || "Invalid OTP"
);

}

}

</script></body>
</html>
