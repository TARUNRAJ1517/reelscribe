<!DOCTYPE html><html>
<head>
  <title>ReelScribe Upload Test</title>
</head>
<body>  <h2>ReelScribe Upload Test 🚀</h2>  <input type="file" id="videoFile" accept="video/*">
  <br><br><button onclick="uploadVideo()">Upload Video</button>

  <pre id="result"></pre>  <script>
    async function uploadVideo() {

      const fileInput = document.getElementById("videoFile");

      if (!fileInput.files[0]) {
        alert("Select a video first");
        return;
      }

      const formData = new FormData();
      formData.append("video", fileInput.files[0]);

      const response = await fetch(
        "https://reelscribe-8ds5.onrender.com/upload",
        {
          method: "POST",
          body: formData
        }
      );

      const data = await response.json();

      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
    }
  </script></body>
</html>
