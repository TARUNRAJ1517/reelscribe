<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReelScribe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b0718;
    padding:20px;
    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
    font-size:28px;
    background:linear-gradient(90deg,#8b5cf6,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    color:#8d8aa5;
    font-size:16px;
    margin-bottom:25px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#121026;
    border:1px solid #2b224a;
    border-radius:28px;
    padding:25px;
    margin-top:10px;
    box-shadow:0 0 30px rgba(139,92,246,.08);
}

.sectionTitle{
    font-size:12px;
    letter-spacing:2px;
    color:#8d8aa5;
    margin-bottom:10px;
}

.tabs{
    margin-bottom:20px;
}

.tab{
    display:inline-block;
    padding:8px 18px;
    border-radius:10px;
    background:#1a1730;
    border:1px solid #2b224a;
    color:white;
    font-size:14px;
    cursor:pointer;
}

.tab.active{
    background:linear-gradient(90deg,#8b5cf6,#ec4899);
    border:none;
}

.uploadBox{
    border:3px dashed #3b2b6d;
    border-radius:24px;
    padding:60px 20px;
    min-height:300px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#0d0a1d;
    cursor:pointer;
    transition:.3s;
}

.uploadBox:hover{
    border-color:#8b5cf6;
    transform:scale(1.01);
}

.uploadIcon{
    font-size:80px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 15px rgba(139,92,246,.5));
}

.uploadBox h2{
    font-size:22px;
    margin-bottom:10px;
    text-align:center;
    color:white;
}

.uploadBox .uploadHint{
    color:#8d8aa5;
    text-align:center;
    font-size:14px;
}

#fileName{
    text-align:center;
    color:#b8b8c5;
    margin:15px 0;
    font-size:14px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:100%;
    padding:0 10px;
}

.langSection{
    margin-top:20px;
}

.langTitle{
    text-align:left;
    font-size:12px;
    letter-spacing:2px;
    color:#8d8aa5;
    margin-bottom:10px;
}

#language{
    width:100%;
    padding:15px;
    border-radius:16px;
    border:1px solid #2b224a;
    background:#1a1730;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#8b5cf6,#ec4899);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:20px;
}

#previewBox{
    display:none;
    margin-top:25px;
    padding:20px;
    background:#1a1730;
    border:1px solid #2b224a;
    border-radius:20px;
}

#previewBox h3{
    margin-bottom:10px;
    color:white;
    font-size:16px;
}

#previewText{
    white-space:pre-wrap;
    line-height:1.6;
    color:#ccc;
    font-size:14px;
}

#previewBox hr{
    margin:15px 0;
    border-color:#2b224a;
}

#loginSection .lockText{
    text-align:center;
    color:#8d8aa5;
    font-size:14px;
    margin-bottom:5px;
}
</style>
</head>

<body>

<h1>🚀 ReelScribe</h1>

<p class="subtitle">
Upload any video and get an accurate transcript instantly.
</p>

<div class="container">

    <h3 class="sectionTitle">INPUT METHOD</h3>

    <div class="tabs">
        <div class="tab active">📁 File Upload</div>
    </div>

    <div class="uploadBox">

        <div class="uploadIcon">🎬</div>

        <h2>Video ya Audio Upload Karein</h2>

        <p class="uploadHint">MP4 • MOV • WebM • MP3 • M4A</p>

        <input type="file" id="videoFile" accept="video/*,audio/*" hidden>

    </div>

    <p id="fileName">No file selected</p>

    <div class="langSection">
        <p class="langTitle">LANGUAGE (OPTIONAL)</p>
        <select id="language">
            <option>Auto Detect</option>
            <option>English</option>
            <option>Hindi</option>
            <option>Hinglish</option>
            <option>Urdu</option>
            <option>Bengali</option>
            <option>Tamil</option>
            <option>Telugu</option>
            <option>Marathi</option>
            <option>Gujarati</option>
            <option>Punjabi</option>
        </select>
    </div>

    <button id="transcribeBtn" onclick="transcribeVideo()">Get Transcript</button>

    <div id="previewBox">
        <h3>Transcript Preview</h3>
        <div id="previewText"></div>
        <hr>
        <div id="loginSection">
            <p class="lockText">🔒 Login with Google to unlock full transcript</p>
            <button onclick="googleLogin()">🔵 Continue with Google</button>
        </div>
    </div>

</div>

<script>
let fullTranscript = "";

function googleLogin() {
    window.location.href = "/auth/google";
}

document.addEventListener("DOMContentLoaded", () => {
    document.querySelector(".uploadBox").addEventListener("click", () => {
        document.getElementById("videoFile").click();
    });
});

const params = new URLSearchParams(window.location.search);
const googleEmail = params.get("email");
if (googleEmail) {
    localStorage.setItem("userEmail", googleEmail);
}

async function transcribeVideo() {
    const fileInput = document.getElementById("videoFile");
    if (!fileInput.files.length) {
        alert("Select a video");
        return;
    }

    const previewBox = document.getElementById("previewBox");
    const previewText = document.getElementById("previewText");
    const transcribeBtn = document.getElementById("transcribeBtn");

    // Hide button, show preview
    transcribeBtn.style.display = "none";
    previewBox.style.display = "block";
    previewText.innerText = "⏳ Generating transcript...";

    const userEmail = localStorage.getItem("userEmail") || "guest@example.com";

    const formData = new FormData();
    formData.append("email", userEmail);
    formData.append("video", fileInput.files[0]);

    try {
        const response = await fetch("/transcribe", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (data.success) {
            localStorage.setItem("latestTranscript", data.transcript);
            alert("Transcript Generated");
            previewText.innerText = data.transcript.substring(0, 300) + "...";
            // Button hidden rehta hai — success pe kaam ho gaya
        } else {
            previewText.innerText = data.error || "Something went wrong";
            // Error pe button wapas show karo retry ke liye
            transcribeBtn.style.display = "block";
        }

    } catch (error) {
        previewText.innerText = "❌ Server Error. Please try again.";
        console.error(error);
        // Error pe button wapas show karo retry ke liye
        transcribeBtn.style.display = "block";
    }
}

document.getElementById("videoFile").addEventListener("change", function() {
    if (this.files.length) {
        document.getElementById("fileName").innerText = "📁 " + this.files[0].name;
    }
});
</script>

</body>
</html>
