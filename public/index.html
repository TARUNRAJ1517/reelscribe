<!DOCTYPE html><html>
<head>
  <title>ReelScribe</title>
</head>
<body><h2>ReelScribe 🚀</h2><input
type="email"
id="email"
placeholder="Enter Email"
/>

<br><br>

<h3>Upload Video</h3><input
type="file"
id="videoFile"
accept="video/*"
/>

<button onclick="transcribeVideo()">
  Generate Transcript
</button><br><br>

<h3>Instagram Reel URL</h3><input
type="text"
id="reelUrl"
placeholder="Paste Reel URL"
style="width:300px;"
/>

<button onclick="transcribeReel()">
  Test Reel URL
</button><br><br>

<pre id="result"></pre><script>

async function transcribeVideo() {

  const email =
    document.getElementById("email").value;

  const fileInput =
    document.getElementById("videoFile");

  if (!email) {
    alert("Enter email");
    return;
  }

  if (!fileInput.files[0]) {
    alert("Select a video");
    return;
  }

  const formData = new FormData();

  formData.append("email", email);
  formData.append("video", fileInput.files[0]);

  const response = await fetch("/transcribe", {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
}

async function transcribeReel() {

  const email =
    document.getElementById("email").value;

  const reelUrl =
    document.getElementById("reelUrl").value;

  const response = await fetch("/reel-transcribe", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      reelUrl
    })
  });

  const data = await response.json();

  document.getElementById("result").innerText =
    JSON.stringify(data, null, 2);
}

</script></body>
</html>
