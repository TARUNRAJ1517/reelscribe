<body><div class="container"><h1>🚀 ReelScribe</h1><p>
Upload any video and get an accurate transcript instantly.
</p><input
type="file"
id="videoFile"
accept="video/*"
/>

<button onclick="transcribeVideo()">
Get Transcript
</button><div id="previewBox"><h3>Transcript Preview</h3><div id="previewText"></div><hr><button disabled>
🔒 Login Required (Coming Soon)
</button></div></div>
<script>

let fullTranscript = "";

async function transcribeVideo(){

const fileInput =
document.getElementById("videoFile");

if(!fileInput.files[0]){
alert("Select a video");
return;
}

document.getElementById(
"previewBox"
).style.display = "block";

document.getElementById(
"previewText"
).innerText =
"⏳ Generating transcript...";

const formData = new FormData();

formData.append(
"email",
"test@gmail.com"
);

formData.append(
"video",
fileInput.files[0]
);

try{

const response = await fetch(
"/transcribe",
{
method:"POST",
body:formData
}
);

const data = await response.json();

if(data.success){

fullTranscript =
data.transcript;

const preview =
data.transcript.substring(0,300);

document.getElementById(
"previewText"
).innerText =
preview + "...";

}else{

document.getElementById(
"previewText"
).innerText =
data.error ||
"Something went wrong";

}

}catch(error){

document.getElementById(
"previewText"
).innerText =
"Server Error";

}

}

</script></body>
</html>
